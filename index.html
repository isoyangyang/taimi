<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FBE3D6" />
  <title>Taimi — grow together</title>
  <meta name="description" content="A gentle companion for the first years, for parents in Finland." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Top navigation bar -->
  <header class="appbar" id="appbar">
    <button class="appbar__left" id="navLeft" aria-label="Home">
      <span class="brand">
        <span class="brand__leaf" aria-hidden="true">🌱</span>
        <span class="brand__name">Taimi</span>
      </span>
    </button>
    <h1 class="appbar__title" id="navTitle" hidden></h1>
    <div class="appbar__right">
      <button class="iconbtn" id="navJourney" aria-label="Baby's journey">
        <!-- timeline / path icon -->
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="6" cy="6" r="2.4"/><circle cx="18" cy="18" r="2.4"/>
          <path d="M6 8.4v3.6a4 4 0 0 0 4 4h4"/>
        </svg>
      </button>
      <button class="iconbtn" id="navSettings" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3.2"/>
          <path d="M12 3v2.2M12 18.8V21M21 12h-2.2M5.2 12H3M18.4 5.6l-1.6 1.6M7.2 16.8l-1.6 1.6M18.4 18.4l-1.6-1.6M7.2 7.2 5.6 5.6"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Everything is rendered into here -->
  <main id="view" class="view" aria-live="polite"></main>

  <!-- Content data (edit these / use studio.html to add more) -->
  <script src="content/stages.js"></script>
  <script src="content/articles.js"></script>
  <script src="content/milestones.js"></script>
  <script src="content/community.js"></script>

  <!-- App logic -->
  <script src="app.js"></script>
</body>
</html>
